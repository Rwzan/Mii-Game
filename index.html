<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تلبيس ستايل Mii</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>صانع شخصيات Mii</h1>

    <div class="game-wrapper">
        <div class="character-preview">
            <img id="layer-body" class="layer" src="assets/body (1).png" alt="الجسم">
            <div id="hair-container">
                <img id="layer-hair" class="layer" src="assets/hair01.png" alt="الشعر">
                <img id="layer-face" class="layer" src="assets/face01.png" alt="الوجه">
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <button onclick="changeBody(-1)">السابق</button>
                <span id="body-label">الجسم: 1</span>
                <button onclick="changeBody(1)">التالي</button>
            </div>

            <div class="control-group">
                <button onclick="changeHair(-1)">السابق</button>
                <span id="hair-label">الشعر: 1</span>
                <button onclick="changeHair(1)">التالي</button>
            </div>
            
            <div class="control-group">
                <button onclick="changeFace(-1)">السابق</button>
                <span id="face-label">الوجه: 1</span>
                <button onclick="changeFace(1)">التالي</button>
            </div>

            <div class="control-group" style="flex-direction: column; gap: 10px;">
                <span>تعديل موقع وحجم الشعر والرأس:</span>
                <div class="mini-buttons">
                    <button class="btn-adjust" onclick="adjustHair('up')" title="فوق">⬆️</button>
                    <button class="btn-adjust" onclick="adjustHair('down')" title="تحت">⬇️</button>
                    <button class="btn-adjust" onclick="adjustHair('left')" title="يسار">⬅️</button>
                    <button class="btn-adjust" onclick="adjustHair('right')" title="يمين">➡️</button>
                    <button class="btn-adjust" onclick="adjustHair('plus')" title="تكبير">➕</button>
                    <button class="btn-adjust" onclick="adjustHair('minus')" title="تصغير">➖</button>
                </div>
            </div>

            <div class="control-group" style="flex-direction: column; gap: 10px;">
                <span>تعديل موقع وحجم ملامح الوجه:</span>
                <div class="mini-buttons">
                    <button class="btn-adjust" onclick="adjustFace('up')" title="فوق">⬆️</button>
                    <button class="btn-adjust" onclick="adjustFace('down')" title="تحت">⬇️</button>
                    <button class="btn-adjust" onclick="adjustFace('left')" title="يسار">⬅️</button>
                    <button class="btn-adjust" onclick="adjustFace('right')" title="يمين">➡️</button>
                    <button class="btn-adjust" onclick="adjustFace('plus')" title="تكبير">➕</button>
                    <button class="btn-adjust" onclick="adjustFace('minus')" title="تصغير">➖</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
